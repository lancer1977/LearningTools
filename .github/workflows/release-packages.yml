name: Publish Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      package_version:
        description: "Override the package version. Defaults to the tag name without the leading v."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Polyhydra.Trivia.slnx --configfile NuGet.Public.config

      - name: Build
        run: dotnet build Polyhydra.Trivia.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Polyhydra.Trivia.slnx --configuration Release --no-build

      - name: Resolve package version
        shell: bash
        env:
          PACKAGE_VERSION_INPUT: ${{ inputs.package_version }}
        run: |
          version="$PACKAGE_VERSION_INPUT"
          if [[ -z "$version" ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "$version" ]]; then
            echo "A package version is required." >&2
            exit 1
          fi

          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Pack core package
        run: >
          dotnet pack src/Polyhydra.Trivia.Core/Polyhydra.Trivia.Core.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion="$PACKAGE_VERSION"

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_OWNER: ${{ github.repository_owner }}
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --source "https://nuget.pkg.github.com/${PACKAGE_OWNER}/index.json"
          --api-key "$GITHUB_TOKEN"
          --skip-duplicate

      - name: Publish to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "NUGET_API_KEY secret is required to publish to NuGet.org." >&2
            exit 1
          fi

          dotnet nuget push "artifacts/packages/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
