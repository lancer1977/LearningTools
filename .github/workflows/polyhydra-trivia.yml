name: Polyhydra Trivia

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Polyhydra.Trivia.slnx --configfile NuGet.Public.config

      - name: Build
        run: dotnet build Polyhydra.Trivia.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Polyhydra.Trivia.slnx --configuration Release --no-build --logger trx --results-directory artifacts/test-results

      - name: Pack core library
        run: dotnet pack src/Polyhydra.Trivia.Core/Polyhydra.Trivia.Core.csproj --configuration Release --no-build --output artifacts/packages

      - name: Publish API artifact
        run: dotnet publish src/Polyhydra.Trivia.Api/Polyhydra.Trivia.Api.csproj --configuration Release --no-build --output artifacts/api

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: polyhydra-trivia-test-results
          path: artifacts/test-results

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polyhydra-trivia-packages
          path: artifacts/packages

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: polyhydra-trivia-api
          path: artifacts/api
